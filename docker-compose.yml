services:
  postgres:
    image: postgres:16-alpine
    container_name: systemagt-postgres
    restart: unless-stopped
    networks:
      - traefik-public
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-systemagt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-systemagt_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-systemagt_user} -d ${POSTGRES_DB:-systemagt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: systemagt-api
    restart: unless-stopped
    networks:
      - traefik-public
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-systemagt_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-systemagt_db}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      WHATSAPP_API_URL: http://whatsapp:3002/send
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_APP_PASSWORD: ${EMAIL_APP_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      whatsapp:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      # LABELS DO TRAEFIK PARA A API
      - "traefik.enable=true"
      # Rota para /api/* vai para o backend
      - "traefik.http.routers.systemagt-api.rule=Host(`systemagt.duckdns.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.systemagt-api.entrypoints=websecure"
      - "traefik.http.routers.systemagt-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.systemagt-api.loadbalancer.server.port=3000"
      - "traefik.http.routers.systemagt-api.priority=10"
      # Rota para /uploads/* também vai para o backend
      - "traefik.http.routers.systemagt-uploads.rule=Host(`systemagt.duckdns.org`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.systemagt-uploads.entrypoints=websecure"
      - "traefik.http.routers.systemagt-uploads.tls.certresolver=letsencrypt"
      - "traefik.http.routers.systemagt-uploads.priority=10"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: systemagt-frontend
    restart: unless-stopped
    networks:
      - traefik-public
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # Frontend pega tudo que não for /api ou /uploads
      - "traefik.http.routers.systemagt.rule=Host(`systemagt.duckdns.org`)"
      - "traefik.http.routers.systemagt.entrypoints=websecure"
      - "traefik.http.routers.systemagt.tls.certresolver=letsencrypt"
      - "traefik.http.services.systemagt.loadbalancer.server.port=80"
      - "traefik.http.routers.systemagt.priority=1"

  whatsapp:
    build:
      context: ./wts
      dockerfile: Dockerfile
    container_name: systemagt-whatsapp
    restart: unless-stopped
    networks:
      - traefik-public
    volumes:
      - whatsapp-sessions:/app/auth_sessions
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      # Rota para /wts/* vai para o servico WhatsApp
      - "traefik.http.routers.systemagt-whatsapp.rule=Host(`systemagt.duckdns.org`) && PathPrefix(`/wts`)"
      - "traefik.http.routers.systemagt-whatsapp.entrypoints=websecure"
      - "traefik.http.routers.systemagt-whatsapp.tls.certresolver=letsencrypt"
      - "traefik.http.services.systemagt-whatsapp.loadbalancer.server.port=3002"
      - "traefik.http.routers.systemagt-whatsapp.priority=10"
      # Middleware para remover /wts do path
      - "traefik.http.middlewares.strip-wts.stripprefix.prefixes=/wts"
      - "traefik.http.routers.systemagt-whatsapp.middlewares=strip-wts"

volumes:
  postgres-data:
  whatsapp-sessions:

networks:
  traefik-public:
    external: true